<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jazz en Cramer</title>
    <meta
      name="description"
      content="Paga de forma segura con Mercado Pago. Selecciona un monto fijo y completa tu pago en segundos."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@500;700;900&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #f7585c;
        --ink: #101010;
        --muted: #272727;
        --panel: #be3b2f;
        --card: #f6f1e6;
        --line: #101010;
        --accent: #1a1a1a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "League Spartan", sans-serif;
        color: var(--ink);
        background-color: var(--paper);
      }

      .page {
        min-height: 100vh;
        display: grid;
        align-items: start;
        padding: 16px 14px 24px;
      }

      .card {
        width: 100%;
        background: transparent;
        border: none;
        padding: 0;
        animation: reveal 440ms ease both;
      }

      .card-head {
        display: grid;
        gap: 10px;
        margin-bottom: 12px;
      }

      .poster-stripe {
        width: 100%;
        height: 12px;
        background: var(--ink);
        margin-bottom: 12px;
      }

      .poster-stripe::after {
        content: "";
        display: block;
        width: 28%;
        height: 100%;
        margin-left: auto;
        background: var(--card);
      }

      h1 {
        margin: 0;
        line-height: 0.84;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        font-size: clamp(2.6rem, 18vw, 8.8rem);
        max-width: 8ch;
        color: #111111;
      }

      .subtitle {
        margin: 0;
        margin-top: 6px;
        color: var(--muted);
        font-size: 0.88rem;
        line-height: 1.25;
        max-width: none;
        width: 100%;
        text-transform: uppercase;
        font-weight: 700;
      }

      .payment-status {
        margin: 0;
        border: 3px solid var(--line);
        background: var(--card);
        padding: 10px 12px;
        font-size: 0.72rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .redirect-result {
        margin-top: 10px;
      }

      .back-link {
        display: block;
        margin-top: 10px;
        font-family: "Space Mono", monospace;
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-align: center;
        color: var(--ink);
      }

      .payment-status[data-status="success"] {
        background: #d8ffd8;
      }

      .payment-status[data-status="failure"] {
        background: #ffd9d9;
      }

      .payment-status[data-status="pending"] {
        background: #fff5cc;
      }

      .payment-grid {
        display: grid;
        gap: 0;
        border: 3px solid var(--line);
        margin: 10px 0 0 0;
      }

      .custom-payment {
        margin: 10px 0 0;
        border: 3px solid var(--line);
        background: var(--card);
        padding: 12px;
      }

      .custom-payment-title {
        margin: 0 0 10px;
        font-size: 0.78rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .custom-payment-form {
        display: grid;
        gap: 8px;
      }

      .amount-input-wrap {
        display: grid;
        grid-template-columns: auto 1fr;
        border: 2px solid var(--line);
        min-height: 56px;
      }

      .amount-prefix {
        display: grid;
        place-items: center;
        width: 52px;
        border-right: 2px solid var(--line);
        font-weight: 900;
        font-size: 1.3rem;
      }

      .amount-input {
        border: none;
        background: transparent;
        width: 100%;
        font: inherit;
        font-size: 1.7rem;
        font-weight: 900;
        letter-spacing: 0.01em;
        padding: 8px 10px;
      }

      .amount-input:focus {
        outline: none;
      }

      .custom-pay-btn {
        appearance: none;
        border: 2px solid var(--line);
        background: var(--ink);
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 700;
        padding: 11px 12px;
        cursor: pointer;
      }

      .custom-pay-btn:hover,
      .custom-pay-btn:focus-visible {
        background: var(--panel);
      }

      .custom-pay-btn[disabled] {
        opacity: 0.65;
        cursor: not-allowed;
      }

      .custom-payment-help {
        margin: 8px 0 0;
        min-height: 1.1em;
        font-size: 0.68rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .alias-highlight {
        display: inline-block;
        background: var(--ink);
        color: #fff;
        padding: 2px 6px;
        line-height: 1;
      }

      .payment-btn {
        appearance: none;
        border: none;
        border-bottom: 3px solid var(--line);
        counter-increment: option;
        cursor: pointer;
        text-align: left;
        width: 100%;
        padding: 16px 14px 14px;
        background: var(--card);
        color: var(--ink);
        transition:
          transform 120ms ease,
          background-color 120ms ease,
          color 120ms ease;
        position: relative;
      }

      .payment-btn:last-child {
        border-bottom: none;
      }

      .payment-btn:hover,
      .payment-btn:focus-visible {
        background: var(--accent);
        color: #ffffff;
        transform: translateX(4px);
        outline: 2px solid var(--line);
        outline-offset: 2px;
      }

      .payment-btn:active {
        transform: translateY(0);
      }

      .payment-btn .label {
        display: block;
        font-size: 0.7rem;
        letter-spacing: 0.13em;
        text-transform: uppercase;
        margin-bottom: 6px;
      }

      .payment-btn .amount {
        display: block;
        font-weight: 900;
        letter-spacing: 0.02em;
        font-size: 2rem;
      }

      .payment-btn::after {
        content: "0" counter(option);
        position: absolute;
        top: 8px;
        right: 10px;
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        opacity: 0.7;
      }

      .footer-note {
        margin: 10px 0 0;
        font-size: 0.68rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink);
        border-top: 2px solid var(--line);
        padding-top: 10px;
      }

      .payment-status,
      .custom-payment-title,
      .custom-pay-btn,
      .custom-payment-help,
      .payment-btn .label,
      .payment-btn::after,
      .footer-note {
        font-family: "Space Mono", monospace;
      }

      @media (min-width: 720px) {
        .page {
          padding: 26px 24px 32px;
        }

        .card-head {
          grid-template-columns: 1.35fr 0.65fr;
          align-items: start;
          column-gap: 24px;
        }

        .subtitle {
          margin-top: 6px;
          grid-column: 1 / -1;
        }

        .payment-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
          border-bottom: 0;
          counter-reset: option;
        }

        .custom-payment-form {
          grid-template-columns: 1fr auto;
          align-items: stretch;
        }

        .custom-pay-btn {
          min-width: 240px;
        }

        .payment-btn {
          min-height: 165px;
          border-bottom: 0;
          border-right: 3px solid var(--line);
        }

        .payment-btn:last-child {
          border-right: 0;
        }
      }

      @keyframes reveal {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <svg aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden">
      <symbol id="icon-whatsapp" viewBox="0 0 256 256">
        <g transform="translate(1.4065934065934016 1.4065934065934016) scale(2.81 2.81)">
          <path fill="currentColor" fill-rule="evenodd" d="M 76.735 13.079 C 68.315 4.649 57.117 0.005 45.187 0 C 20.605 0 0.599 20.005 0.589 44.594 c -0.003 7.86 2.05 15.532 5.953 22.296 L 0.215 90 l 23.642 -6.202 c 6.514 3.553 13.848 5.426 21.312 5.428 h 0.018 c 0.001 0 -0.001 0 0 0 c 24.579 0 44.587 -20.007 44.597 -44.597 C 89.789 32.713 85.155 21.509 76.735 13.079 z M 27.076 46.217 c -0.557 -0.744 -4.55 -6.042 -4.55 -11.527 c 0 -5.485 2.879 -8.181 3.9 -9.296 c 1.021 -1.115 2.229 -1.394 2.972 -1.394 s 1.487 0.007 2.136 0.039 c 0.684 0.035 1.603 -0.26 2.507 1.913 c 0.929 2.231 3.157 7.717 3.436 8.274 c 0.279 0.558 0.464 1.208 0.093 1.952 c -0.371 0.743 -0.557 1.208 -1.114 1.859 c -0.557 0.651 -1.17 1.453 -1.672 1.952 c -0.558 0.556 -1.139 1.159 -0.489 2.274 c 0.65 1.116 2.886 4.765 6.199 7.72 c 4.256 3.797 7.847 4.973 8.961 5.531 c 1.114 0.558 1.764 0.465 2.414 -0.279 c 0.65 -0.744 2.786 -3.254 3.529 -4.369 c 0.743 -1.115 1.486 -0.929 2.507 -0.558 c 1.022 0.372 6.5 3.068 7.614 3.625 c 1.114 0.558 1.857 0.837 2.136 1.302 c 0.279 0.465 0.279 2.696 -0.65 5.299 c -0.929 2.603 -5.381 4.979 -7.522 5.298 c -1.92 0.287 -4.349 0.407 -7.019 -0.442 c -1.618 -0.513 -3.694 -1.199 -6.353 -2.347 C 34.934 58.216 27.634 46.961 27.076 46.217 z"/>
        </g>
      </symbol>
    </svg>

    <main class="page">
      <section class="card" aria-labelledby="titulo-pagos">
        <div class="poster-stripe" aria-hidden="true"></div>
        <div class="card-head">
          <div>
            <h1 id="titulo-pagos">Jazz en Cramer</h1>
          </div>
        </div>

        <section class="redirect-result" id="redirect-result" hidden>
          <p class="payment-status" id="payment-status" aria-live="polite"></p>
          <a class="back-link" href="/">Volver al inicio</a>
        </section>


        <div id="initial-interface">
          <p class="subtitle">
            Gracias por apoyarnos! Elegí un aporte y completá el pago seguro con
            Mercado Pago.
          </p>
          <p class="subtitle">
            Si preferís, podés hacer una transferencia al alias
            <span class="alias-highlight">JAZZBB</span>.
          </p>

          <div class="payment-grid" id="payment-grid" aria-live="polite"></div>

          <section
            class="custom-payment"
            aria-labelledby="custom-payment-title"
          >
            <h2 class="custom-payment-title" id="custom-payment-title">
              Elegí el monto de tu aporte
            </h2>
            <form class="custom-payment-form" id="custom-payment-form">
              <label class="amount-input-wrap" for="custom-amount">
                <span class="amount-prefix">$</span>
                <input
                  id="custom-amount"
                  class="amount-input"
                  type="number"
                  inputmode="numeric"
                  min="100"
                  step="1"
                  placeholder="Ej: 6500"
                  required
                />
              </label>
              <button class="custom-pay-btn" id="custom-pay-btn" type="submit" disabled>
                Ir a Mercado Pago
              </button>
            </form>
            <p
              class="custom-payment-help"
              id="custom-payment-help"
              aria-live="polite"
            ></p>
          </section>

          <p class="footer-note">
            Sumate a <a href="https://chat.whatsapp.com/HJ9d9MuvjIV7rrOHNu0iuq?mode=gi_t"><b><svg width="10" height="10" aria-hidden="true" style="display:inline;vertical-align:middle"><use href="#icon-whatsapp"/></svg> 291 JAZZ</b></a> para enterarte de toda la actividad jazzística en Bahía.
          </p>
        </div>
      </section>
    </main>

    <template id="payment-template-success">
      <p>Pago aprobado. Gracias por tu aporte.</p>
      <p>Si te interesa enterarte de toda la actividad jazzística en Bahía, sumate en WhatsApp a <a href="https://chat.whatsapp.com/HJ9d9MuvjIV7rrOHNu0iuq?mode=gi_t"><b><svg width="10" height="10" aria-hidden="true" style="display:inline;vertical-align:middle"><use href="#icon-whatsapp"/></svg> 291 JAZZ</b></a></p>
      <h3>Seguinos en Instagram!</h3>
      <ul>
        <li><a href="https://www.instagram.com/aristamanu/">Manu Aristarán @aristamanu</a></li>
        <li><a href="https://www.instagram.com/franco_grimoldi">Franco Grimoldi @franco_grimoldi</a></li>
        <li><a href="https://www.instagram.com/luvitalimusica">Lu Vitali @luvitalimusica</a></li>
      </ul>
      <p>Nos vemos la próxima fecha!</p>
    </template>
    <template id="payment-template-failure">
      El pago no se pudo completar. Podés intentarlo nuevamente.
    </template>
    <template id="payment-template-pending">
      Pago pendiente. Mercado Pago te avisará cuando se acredite.
    </template>

    <script>
      const WORKER_URL = "https://jazzbusk-payments.jazzbb.workers.dev";

      const paymentOptions = [
        {
          amount: 20000,
          label: "Aporte completo",
        },
        {
          amount: 10000,
          label: "Aporte intermedio",
        },
        {
          amount: 5000,
          label: "Aporte base",
        },
      ];

      const MIN_AMOUNT = 100;
      const MAX_AMOUNT = 10000000;

      const currencyFormatter = new Intl.NumberFormat("es-AR", {
        style: "currency",
        currency: "ARS",
        maximumFractionDigits: 0,
      });

      const initialInterface = document.getElementById("initial-interface");
      const redirectResult = document.getElementById("redirect-result");
      const paymentGrid = document.getElementById("payment-grid");
      const paymentStatus = document.getElementById("payment-status");
      const customPaymentForm = document.getElementById("custom-payment-form");
      const customAmountInput = document.getElementById("custom-amount");
      const customPayBtn = document.getElementById("custom-pay-btn");
      const customPaymentHelp = document.getElementById("custom-payment-help");

      function renderPaymentRedirectStatus() {
        const searchParams = new URLSearchParams(window.location.search);
        const rawStatus = (searchParams.get("payment") || "").toLowerCase();

        if (!rawStatus) {
          redirectResult.hidden = true;
          initialInterface.hidden = false;
          return false;
        }

        const normalizedStatus =
          rawStatus === "panding" ? "pending" : rawStatus;

        const templateMap = {
          success: "payment-template-success",
          failure: "payment-template-failure",
          pending: "payment-template-pending",
        };

        const templateId = templateMap[normalizedStatus];

        if (!templateId) {
          redirectResult.hidden = true;
          initialInterface.hidden = false;
          return false;
        }

        const template = document.getElementById(templateId);
        paymentStatus.replaceChildren(template.content.cloneNode(true));
        paymentStatus.dataset.status = normalizedStatus;
        initialInterface.hidden = true;
        redirectResult.hidden = false;
        return true;
      }

      function setCustomHelpMessage(message) {
        customPaymentHelp.textContent = message;
      }

      function setCustomLoadingState(isLoading) {
        customPayBtn.disabled = isLoading;
        customPayBtn.textContent = isLoading
          ? "Creando pago..."
          : "Pagar monto libre";
      }

      function isAmountValid(amount) {
        return (
          Number.isFinite(amount) &&
          amount >= MIN_AMOUNT &&
          amount <= MAX_AMOUNT
        );
      }

      async function createPreferenceAndRedirect(amount, label) {
        const response = await fetch(`${WORKER_URL}/api/create-preference`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ amount, label }),
        });

        if (!response.ok) {
          const errorBody = await response.json().catch(() => ({}));
          throw new Error(errorBody.error || "No se pudo crear el pago.");
        }

        const data = await response.json();

        if (!data.checkoutUrl) {
          throw new Error("La respuesta no incluye una URL de checkout.");
        }

        window.location.href = data.checkoutUrl;
      }

      function createPaymentButton(option) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "payment-btn";
        button.setAttribute(
          "aria-label",
          `Pagar ${currencyFormatter.format(option.amount)} con Mercado Pago`,
        );

        button.innerHTML = `
          <span class="label">${option.label}</span>
          <span class="amount">${currencyFormatter.format(option.amount)}</span>
        `;

        button.addEventListener("click", async () => {
          button.disabled = true;
          const previousHtml = button.innerHTML;
          button.innerHTML = `<span class="label">Procesando</span><span class="amount">...</span>`;

          try {
            await createPreferenceAndRedirect(option.amount, option.label);
          } catch (error) {
            alert(
              error instanceof Error
                ? error.message
                : "No se pudo iniciar el pago.",
            );
            button.innerHTML = previousHtml;
            button.disabled = false;
          }
        });

        return button;
      }

      function renderPaymentButtons() {
        paymentOptions.forEach((option) => {
          paymentGrid.appendChild(createPaymentButton(option));
        });
      }

      async function handleCustomPaymentSubmit(event) {
        event.preventDefault();

        const amount = Number(customAmountInput.value);

        if (!isAmountValid(amount)) {
          setCustomHelpMessage(
            `Ingresa un monto valido entre ${currencyFormatter.format(MIN_AMOUNT)} y ${currencyFormatter.format(MAX_AMOUNT)}.`,
          );
          return;
        }

        setCustomHelpMessage("");
        setCustomLoadingState(true);

        try {
          await createPreferenceAndRedirect(amount, "Aporte libre");
        } catch (error) {
          setCustomHelpMessage(
            error instanceof Error
              ? error.message
              : "No se pudo iniciar el pago.",
          );
          setCustomLoadingState(false);
        }
      }

      const isRedirectFlow = renderPaymentRedirectStatus();

      if (!isRedirectFlow) {
        customAmountInput.addEventListener("input", () => {
          customPayBtn.disabled = !isAmountValid(Number(customAmountInput.value));
        });
        customPaymentForm.addEventListener("submit", handleCustomPaymentSubmit);
        renderPaymentButtons();
      }
    </script>
  </body>
</html>
